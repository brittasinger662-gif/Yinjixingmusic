<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音迹星工作室 - 专属试听</title>
    <style>
        /* 基础防盗：禁止选择和长按 */
        * { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
        
        body { margin: 0; background: #0a0a0b; color: #fff; font-family: 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* 唱片视觉 */
        .record-box { position: relative; width: 260px; height: 260px; margin-bottom: 40px; pointer-events: none; }
        .record { width: 100%; height: 100%; background: url('https://image.freepik.com/free-vector/vinyl-record-disc-mockup_1017-25126.jpg') center/cover; border-radius: 50%; border: 4px solid #333; animation: rotate 10s linear infinite; animation-play-state: paused; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .playing { animation-play-state: running; }
        
        /* 品牌标识 */
        .brand { text-align: center; margin-bottom: 30px; }
        .brand-name { color: #c0a16b; font-size: 22px; font-weight: bold; letter-spacing: 4px; }
        .brand-tag { color: #555; font-size: 11px; margin-top: 5px; letter-spacing: 2px; }

        /* 播放器加固 */
        .player-container { width: 85%; max-width: 380px; }
        audio { width: 100%; filter: invert(1) brightness(1.5); }
        
        /* 隐藏 Chrome 内核播放器的三个点下载菜单 */
        audio::-webkit-media-controls-enclosure { overflow:hidden; }
        audio::-webkit-media-controls-panel { width: calc(100% + 30px); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .hint { margin-top: 20px; font-size: 12px; color: #444; }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="record-box">
        <div id="disk" class="record"></div>
    </div>
    
    <div class="brand">
        <div class="brand-name">音迹星工作室</div>
        <div class="brand-tag">CUSTOMER PREVIEW</div>
    </div>

    <div class="player-container">
        <audio id="audio" controls controlsList="nodownload" oncontextmenu="return false"></audio>
    </div>

    <p class="hint">专属定制 · 严禁转载</p>

    <script>
        // 禁止 F12 和常用开发者快捷键
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        const params = new URLSearchParams(window.location.search);
        const src = params.get('src');
        const audio = document.getElementById('audio');
        const disk = document.getElementById('disk');

        if (src) {
            audio.src = src;
        } else {
            document.querySelector('.brand-name').innerText = "未找到音频件";
        }

        // 联动动画
        audio.onplay = () => disk.classList.add('playing');
        audio.onpause = () => disk.classList.remove('playing');
        audio.onended = () => disk.classList.remove('playing');
    </script>
</body>
</html>
