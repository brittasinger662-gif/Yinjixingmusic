<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音迹星工作室 - 专属定制预览</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --accent: #c0a16b; --bg: #050505; --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.15);
            --glass: rgba(255, 255, 255, 0.05);
        }
        [data-theme="light"] {
            --bg: #f5f7f9; --text: #1a1a1a;
            --text-dim: rgba(0, 0, 0, 0.15); --glass: rgba(0, 0, 0, 0.05);
        }
        * { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.5s; position: relative; }

        /* 1. 粒子特效：仅在默认模式显示，且大幅增强颜色 */
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0; transition: 0.5s; }
        body.mode-default #particle-canvas { opacity: 0.8; } /* 默认模式开启，亮度提高 */

        /* 2. 动态光波（音波）：默认模式专属 */
        .wave-container { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; z-index: 2; }
        body.mode-default .wave-container { display: flex; }
        .dynamic-wave {
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(20px); opacity: 0;
        }
        .playing .dynamic-wave { animation: wave-flash 1.5s infinite ease-out; }

        .nav { padding: 15px 20px; display: flex; justify-content: space-between; z-index: 100; flex-shrink: 0; }
        .btn-tool { background: var(--glass); border: 1px solid rgba(128,128,128,0.1); color: var(--text); padding: 8px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; }

        /* 3. 唱片区域：统一中心对齐 */
        .record-section { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; transition: 0.5s; }
        .record-box { width: 260px; height: 260px; position: relative; transition: 0.5s; }
        
        .vinyl { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: repeating-radial-gradient(circle, #0a0a0a, #000 1px, #181818 2px); 
            border: 6px solid #111; display: flex; align-items: center; justify-content: center; 
            animation: rotate 20s linear infinite paused; position: relative; z-index: 5;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }
        .vinyl.playing { animation-play-state: running; }

        /* 默认模式：封面覆盖 */
        body.mode-default .cover-art { width: 100% !important; height: 100% !important; border: none; }
        
        /* 纯净模式：物理样板样式 */
        body.mode-pure .vinyl { 
            background: radial-gradient(circle, transparent 42%, rgba(0,0,0,0.9) 43%), 
                        repeating-radial-gradient(circle, #080808, #000 1px, #1a1a1a 2px); 
            width: 240px; height: 240px;
        }
        .vinyl-inner-ring { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        body.mode-pure .vinyl-inner-ring::before {
            content: ""; position: absolute; width: 46%; height: 46%; border-radius: 50%;
            background: #050505; box-shadow: inset 0 0 15px #000; z-index: 3;
        }
        .cover-art { width: 78%; height: 78%; border-radius: 50%; background-size: cover; background-position: center; z-index: 5; background-color: #111; transition: 0.5s; background-image: url('https://pdyvfhfwqlrizgcxlgax.supabase.co/storage/v1/object/public/MUSIC-FILES/default_gold.jpg'); }
        body.mode-pure .cover-art { width: 33%; height: 33%; z-index: 10; }

        /* 4. 品牌词：呼吸灯亮暗循环 */
        .brand-section { text-align: center; margin-top: 20px; display: none; z-index: 100; }
        body.mode-pure .brand-section { display: block; }
        .brand-title { 
            font-size: 26px; font-weight: 700; letter-spacing: 5px; margin: 0;
            color: var(--accent); animation: brand-glow 3s infinite ease-in-out;
        }
        .pinyin { font-size: 9px; color: var(--accent); opacity: 0.6; letter-spacing: 2px; margin-top: 4px; }
        .pure-disclaimer { font-size: 9px; color: #555; margin-top: 15px; letter-spacing: 1px; }

        /* 5. 歌词布局：宽度缩小 */
        .lrc-viewport { 
            flex-grow: 1.5; position: relative; overflow-y: auto; scroll-snap-type: y mandatory;
            width: 75%; margin: 0 auto; z-index: 20;
            mask-image: linear-gradient(to bottom, transparent 0%, #fff 40%, #fff 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #fff 40%, #fff 60%, transparent 100%);
        }
        .lrc-viewport::-webkit-scrollbar { display: none; }
        #lrc-list { list-style: none; padding: 180px 0; margin: 0; text-align: center; }
        .lrc-line { padding: 12px 10px; font-size: 15px; color: var(--text-dim); min-height: 50px; display: flex; align-items: center; justify-content: center; scroll-snap-align: center; cursor: pointer; position: relative; }
        .lrc-line.active { color: var(--text); font-size: 20px; font-weight: 600; }
        .lrc-line.preview { color: var(--accent); opacity: 0.8; }

        /* 歌词跳播虚线 */
        body.mode-lyrics .lrc-line.preview::after { content: ""; position: absolute; right: -25px; width: 100vw; height: 1px; border-bottom: 1px dashed rgba(192, 161, 107, 0.4); pointer-events: none; }
        .play-here-btn {
            position: absolute; right: -5px; background: var(--accent); border-radius: 50%; width: 28px; height: 28px;
            display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 30;
        }
        .play-here-btn svg { fill: #000; width: 14px; height: 14px; }
        body.mode-lyrics .lrc-line.preview .play-here-btn { display: flex; }

        /* 6. 统一播放控制栏 */
        .controls-section { flex-shrink: 0; padding: 20px 20px 40px; z-index: 110; width: 100%; }
        .controls-card { width: 100%; max-width: 400px; margin: 0 auto; background: var(--glass); padding: 15px 20px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .progress-box { display: flex; align-items: center; gap: 12px; }
        .p-bar-container { flex: 1; height: 24px; display: flex; align-items: center; cursor: pointer; position: relative; }
        .p-bar { width: 100%; height: 4px; background: rgba(128,128,128,0.2); border-radius: 2px; position: relative; }
        .p-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; position: relative; }
        .p-handle { position: absolute; right: -8px; top: -6px; width: 16px; height: 16px; background: #fff; border-radius: 50%; border: 3px solid var(--accent); box-shadow: 0 0 10px rgba(0,0,0,0.3); }
        .main-btn { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 15px auto 0; cursor: pointer; transition: 0.2s; }
        .main-btn:active { transform: scale(0.9); }

        /* 模式隐藏逻辑 */
        body.mode-lyrics .record-section { display: none; }
        body.mode-pure .lrc-viewport { display: none; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes wave-flash { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.4); opacity: 0; } }
        @keyframes brand-glow { 0%, 100% { opacity: 0.3; filter: brightness(0.8); } 50% { opacity: 1; filter: brightness(1.2); } }
    </style>
</head>
<body class="mode-default" id="main-body" onclick="handleGlobalClick(event)">

    <canvas id="particle-canvas"></canvas>

    <div class="nav">
        <button class="btn-tool" onclick="toggleTheme(event)">🌓 模式切换</button>
        <button class="btn-tool" id="reset-btn" onclick="resetLrc(event)" style="display:none;">回到正唱</button>
    </div>

    <div class="record-section" id="rec-sec">
        <div class="wave-container"><div class="dynamic-wave"></div></div>
        <div id="record-wrapper" class="record-box">
            <div id="disk" class="vinyl">
                <div class="vinyl-inner-ring">
                    <div id="cover" class="cover-art"></div>
                </div>
            </div>
        </div>

        <div class="brand-section">
            <h1 class="brand-title">音迹星工作室</h1>
            <div class="pinyin">YIN JI XING GONG ZUO SHI</div>
            <div class="pure-disclaimer">专属试听 · 严禁转载 · 音迹星工作室</div>
        </div>
    </div>

    <div class="lrc-viewport" id="vPort">
        <ul id="lrc-list"></ul>
    </div>

    <div class="controls-section">
        <div class="controls-card">
            <div class="progress-box">
                <span style="font-size:10px; font-family:monospace; color:var(--accent);" id="t-cur">00:00</span>
                <div class="p-bar-container" id="p-container">
                    <div class="p-bar">
                        <div class="p-fill" id="p-fill"><div class="p-handle"></div></div>
                    </div>
                </div>
                <span style="font-size:10px; font-family:monospace; color:var(--accent);" id="t-dur">00:00</span>
            </div>
            <div class="main-btn" onclick="togglePlay(event)">
                <svg id="svg-p" viewBox="0 0 24 24" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="svg-s" viewBox="0 0 24 24" width="24" height="24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
        </div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio'), disk = document.getElementById('disk');
        const list = document.getElementById('lrc-list'), vPort = document.getElementById('vPort');
        const pFill = document.getElementById('p-fill'), pContainer = document.getElementById('p-container');
        const body = document.getElementById('main-body'), resetBtn = document.getElementById('reset-btn');
        const params = new URLSearchParams(window.location.search);

        let isAuto = true, lyrics = [], displayMode = 0, idleTimer = null, isDragging = false;

        // 1. 初始化数据
        const audioUrl = params.get('audio'), lrcUrl = params.get('lrc');
        if (audioUrl) {
            audio.src = audioUrl;
            window.jsmediatags.read(audioUrl, {
                onSuccess: (tag) => {
                    const img = tag.tags.picture;
                    if (img) {
                        let b64 = "";
                        for (let i = 0; i < img.data.length; i++) b64 += String.fromCharCode(img.data[i]);
                        document.getElementById('cover').style.backgroundImage = `url('data:${img.format};base64,${window.btoa(b64)}')`;
                    }
                }
            });
        }
        if (lrcUrl) {
            fetch(lrcUrl).then(r => r.text()).then(t => {
                lyrics = t.split('\n').map(l => {
                    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
                }).filter(x => x);
                list.innerHTML = lyrics.map((l, i) => 
                    `<li class="lrc-line" id="r-${i}">
                        ${l.text}
                        <div class="play-here-btn" onclick="jumpToTime(event, ${l.time})">
                            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </li>`).join('');
            });
        }

        // 2. 模式与日夜切换
        function handleGlobalClick(e) {
            const forbidden = ['btn-tool', 'lrc-line', 'record-box', 'main-btn', 'p-bar-container', 'play-here-btn', 'p-handle'];
            if (forbidden.some(cls => e.target.classList.contains(cls) || e.target.closest('.' + cls))) return;
            
            displayMode = (displayMode + 1) % 3;
            body.className = ['mode-default', 'mode-lyrics', 'mode-pure'][displayMode];
            resetIdleTimer(); // 视为一次动作
        }

        function toggleTheme(e) { e.stopPropagation(); body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }

        // 3. 智能回弹逻辑
        function resetIdleTimer() {
            clearTimeout(idleTimer);
            if (!isAuto) idleTimer = setTimeout(() => { resetLrc(); }, 8000);
        }
        function setManualMode() { isAuto = false; resetBtn.style.display = 'block'; resetIdleTimer(); }
        function resetLrc(e) { if(e) e.stopPropagation(); isAuto = true; resetBtn.style.display = 'none'; clearTimeout(idleTimer); syncLrc(true); }
        function jumpToTime(e, time) { e.stopPropagation(); audio.currentTime = time; resetLrc(); }

        vPort.addEventListener('wheel', setManualMode);
        vPort.addEventListener('touchstart', setManualMode);

        // 4. 粒子系统：颜色增强 + 仅默认模式显示
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = initCanvas; initCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = canvas.width / 2; this.y = canvas.height / 3;
                this.size = Math.random() * 2 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 1.8 + 0.6;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.life = 1; this.decay = Math.random() * 0.008 + 0.004;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; if (this.life <= 0) this.reset(); }
            draw() {
                // 颜色改为显眼的明金色
                ctx.fillStyle = `rgba(220, 180, 110, ${this.life * 0.9})`; 
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            if (body.classList.contains('mode-default')) {
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 5. 交互式进度条拖拽
        function getPos(clientX) { const rect = pContainer.getBoundingClientRect(); return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)); }
        const moveHandler = (e) => { if (!isDragging) return; const cx = e.touches ? e.touches[0].clientX : e.clientX; pFill.style.width = (getPos(cx) * 100) + '%'; };
        const stopHandler = (e) => { if (!isDragging) return; const cx = e.changedTouches ? e.changedTouches[0].clientX : e.clientX; audio.currentTime = getPos(cx) * audio.duration; isDragging = false; resetIdleTimer(); };
        pContainer.addEventListener('mousedown', (e) => { isDragging = true; moveHandler(e); });
        pContainer.addEventListener('touchstart', (e) => { isDragging = true; moveHandler(e); });
        window.addEventListener('mousemove', moveHandler);
        window.addEventListener('touchmove', moveHandler, { passive: false });
        window.addEventListener('mouseup', stopHandler);
        window.addEventListener('touchend', stopHandler);

        // 6. 同步逻辑
        function syncLrc(force = false) {
            if ((!isAuto && !force) || lyrics.length === 0) return;
            let idx = 0;
            lyrics.forEach((l, i) => { if (audio.currentTime >= l.time) idx = i; });
            const activeLine = document.getElementById(`r-${idx}`);
            if (activeLine) {
                document.querySelectorAll('.lrc-line').forEach(el => el.classList.remove('active', 'preview'));
                activeLine.classList.add('active');
                vPort.scrollTo({ top: activeLine.offsetTop - vPort.offsetHeight/2 + activeLine.offsetHeight/2, behavior: 'smooth' });
            }
        }

        audio.addEventListener('timeupdate', () => { if(!isDragging) { syncLrc(); pFill.style.width = (audio.currentTime / audio.duration) * 100 + '%'; document.getElementById('t-cur').innerText = fmt(audio.currentTime); document.getElementById('t-dur').innerText = fmt(audio.duration); } });
        function togglePlay(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); }
        audio.onplay = () => { ui(true); document.getElementById('rec-sec').classList.add('playing'); };
        audio.onpause = () => { ui(false); document.getElementById('rec-sec').classList.remove('playing'); };
        function ui(p) { document.getElementById('svg-p').style.display = p ? 'none' : 'block'; document.getElementById('svg-s').style.display = p ? 'block' : 'none'; disk.classList.toggle('playing', p); }
        function fmt(s) { const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        
        vPort.addEventListener('scroll', () => {
            if (isAuto) return;
            const mid = vPort.scrollTop + vPort.offsetHeight / 2;
            document.querySelectorAll('.lrc-line').forEach(line => {
                const lineMid = line.offsetTop + line.offsetHeight / 2;
                line.classList.remove('preview');
                if (Math.abs(mid - lineMid) < 30 && !line.classList.contains('active')) line.classList.add('preview');
            });
        });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); togglePlay(e); } });
    </script>
</body>
</html>
