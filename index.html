<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音迹星工作室 - 专属试听</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --accent: #c0a16b; --bg: #0a0a0a; --text: #ffffff; }
        * { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; box-sizing: border-box; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'PingFang SC', sans-serif; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* 顶部导航：回正按钮 */
        .nav { padding: 15px 20px; display: flex; justify-content: flex-end; z-index: 100; }
        .btn-reset { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent); padding: 8px 15px; border-radius: 12px; font-size: 11px; cursor: pointer;
        }

        /* 1. 1:1 物理仿真黑胶 */
        .record-section { flex-shrink: 0; display: flex; justify-content: center; padding: 10px 0; }
        .record-box { width: 260px; height: 260px; position: relative; }
        .vinyl { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: radial-gradient(circle, #000 30%, transparent 31%), 
                        repeating-radial-gradient(circle, #0a0a0a, #000 1px, #181818 2px); 
            border: 6px solid #111; display: flex; align-items: center; justify-content: center; 
            animation: rotate 20s linear infinite paused; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .vinyl.playing { animation-play-state: running; }
        .vinyl::after { 
            content: ""; position: absolute; inset: 0; border-radius: 50%; 
            background: conic-gradient(from 170deg at 50% 50%, transparent 0deg, rgba(255,255,255,0.1) 8deg, transparent 15deg, transparent 170deg, rgba(255,255,255,0.1) 178deg, transparent 185deg); 
            pointer-events: none; 
        }
        .cover-art { width: 75%; height: 75%; border-radius: 50%; background-size: cover; background-position: center; z-index: 5; background-color: #222; }

        /* 2. 标题区 */
        .info-box { text-align: center; padding: 10px 0; }
        .main-title { font-size: 24px; font-weight: 700; letter-spacing: 4px; margin: 0; }
        .status-msg { font-size: 12px; color: #666; letter-spacing: 2px; margin-top: 5px; }

        /* 3. 歌词视口：弹性自适应，绝不遮挡 */
        .lrc-viewport { 
            flex-grow: 1; position: relative; overflow-y: auto; 
            scroll-snap-type: y mandatory;
            mask-image: linear-gradient(to bottom, transparent, #fff 40%, #fff 60%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, #fff 40%, #fff 60%, transparent);
            margin: 10px 0;
        }
        .lrc-viewport::-webkit-scrollbar { display: none; }
        #lrc-list { list-style: none; padding: 150px 0; margin: 0; text-align: center; }
        .lrc-line { 
            padding: 15px 20px; font-size: 14px; color: rgba(255,255,255,0.2); 
            transition: 0.4s ease; min-height: 50px; display: flex; align-items: center; justify-content: center;
            scroll-snap-align: center; cursor: pointer;
        }
        .lrc-line.active { color: #fff; font-size: 19px; font-weight: 600; transform: scale(1.08); }
        .lrc-line.preview { color: var(--accent); opacity: 0.5; font-size: 17px; transform: scale(1.05); }

        /* 4. 控制面板 */
        .controls-section { flex-shrink: 0; padding: 20px; background: linear-gradient(to top, #000, transparent); }
        .controls-card { 
            width: 100%; max-width: 400px; margin: 0 auto; 
            background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 25px; 
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05);
        }
        .progress-box { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .time-lab { font-size: 10px; color: var(--accent); min-width: 35px; font-family: monospace; }
        .p-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .p-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }
        .main-btn { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; cursor: pointer; }
        .disclaimer { font-size: 8px; color: #444; text-align: center; margin-top: 15px; letter-spacing: 1px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="nav">
        <button class="btn-reset" onclick="resetLrc()">🎯 歌词复位</button>
    </div>

    <div class="record-section">
        <div class="record-box">
            <div id="disk" class="vinyl" onclick="togglePlay()">
                <div id="cover" class="cover-art"></div>
            </div>
        </div>
    </div>

    <div class="info-box">
        <h1 class="main-title">音迹星工作室</h1>
        <div id="status" class="status-msg">CUSTOMER PREVIEW</div>
    </div>

    <div class="lrc-viewport" id="vPort" onscroll="handleScroll()">
        <ul id="lrc-list"></ul>
    </div>

    <div class="controls-section">
        <div class="controls-card">
            <div class="progress-box" onclick="seek(event)">
                <span class="time-lab" id="t-cur">00:00</span>
                <div class="p-bar" id="p-bar"><div class="p-fill" id="p-fill"></div></div>
                <span class="time-lab" id="t-dur">00:00</span>
            </div>
            <div class="main-btn" onclick="togglePlay()">
                <svg id="svg-p" viewBox="0 0 24 24" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="svg-s" viewBox="0 0 24 24" width="24" height="24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
            <div class="disclaimer">专属定制 · 严禁转载 · 音迹星工作室</div>
        </div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio');
        const disk = document.getElementById('disk');
        const list = document.getElementById('lrc-list');
        const vPort = document.getElementById('vPort');
        const params = new URLSearchParams(window.location.search);

        let isAuto = true;
        let lyrics = [];

        // 1. 数据接入
        const audioUrl = params.get('audio');
        const lrcUrl = params.get('lrc');

        if (audioUrl) {
            audio.src = audioUrl;
            window.jsmediatags.read(audioUrl, {
                onSuccess: (tag) => {
                    const img = tag.tags.picture;
                    if (img) {
                        let b64 = "";
                        for (let i = 0; i < img.data.length; i++) b64 += String.fromCharCode(img.data[i]);
                        document.getElementById('cover').style.backgroundImage = `url('data:${img.format};base64,${window.btoa(b64)}')`;
                    }
                }
            });
        } else {
            document.getElementById('status').innerText = "未找到音频件";
        }

        if (lrcUrl) {
            fetch(lrcUrl).then(r => r.text()).then(t => {
                lyrics = t.split('\n').map(l => {
                    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
                }).filter(x => x);
                list.innerHTML = lyrics.map((l, i) => `<li class="lrc-line" id="r-${i}" onclick="jumpTo(${i})">${l.text}</li>`).join('');
            });
        }

        // 2. 交互逻辑：复位与预览
        function handleScroll() {
            if (isAuto) return;
            const mid = vPort.scrollTop + vPort.offsetHeight / 2;
            document.querySelectorAll('.lrc-line').forEach(line => {
                const lineMid = line.offsetTop + line.offsetHeight / 2;
                line.classList.remove('preview');
                if (Math.abs(mid - lineMid) < 30 && !line.classList.contains('active')) {
                    line.classList.add('preview');
                }
            });
        }

        function resetLrc() {
            isAuto = true;
            syncLrc();
        }

        function jumpTo(i) {
            isAuto = false;
            const line = document.getElementById(`r-${i}`);
            vPort.scrollTo({ top: line.offsetTop - vPort.offsetHeight/2 + line.offsetHeight/2, behavior: 'smooth' });
        }

        // 3. 播放同步
        function syncLrc() {
            if (!isAuto || lyrics.length === 0) return;
            let idx = 0;
            lyrics.forEach((l, i) => { if (audio.currentTime >= l.time) idx = i; });
            const activeLine = document.getElementById(`r-${idx}`);
            if (activeLine) {
                document.querySelectorAll('.lrc-line').forEach(el => el.classList.remove('active', 'preview'));
                activeLine.classList.add('active');
                vPort.scrollTo({ top: activeLine.offsetTop - vPort.offsetHeight/2 + activeLine.offsetHeight/2, behavior: 'smooth' });
            }
        }

        audio.addEventListener('timeupdate', () => {
            syncLrc();
            const p = (audio.currentTime / audio.duration) * 100;
            document.querySelector('.p-fill').style.width = p + '%';
            document.getElementById('t-cur').innerText = fmt(audio.currentTime);
            document.getElementById('t-dur').innerText = fmt(audio.duration);
        });

        vPort.addEventListener('touchstart', () => isAuto = false);
        vPort.addEventListener('wheel', () => isAuto = false);

        // 4. 基础控制
        function togglePlay() {
            if (audio.paused) { audio.play(); ui(true); } else { audio.pause(); ui(false); }
        }
        function ui(p) {
            document.getElementById('svg-p').style.display = p ? 'none' : 'block';
            document.getElementById('svg-s').style.display = p ? 'block' : 'none';
            p ? disk.classList.add('playing') : disk.classList.remove('playing');
        }
        function fmt(s) { const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        function seek(e) { audio.currentTime = ((e.clientX - document.getElementById('p-bar').getBoundingClientRect().left) / document.getElementById('p-bar').offsetWidth) * audio.duration; }
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); togglePlay(); } });
    </script>
</body>
</html>
