<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音迹星工作室 - 专属定制预览</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card: rgba(15, 15, 15, 0.8);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.15);
            --accent: #c0a16b;
            --shine: linear-gradient(110deg, #888 20%, #fff 40%, #fff 60%, #888 80%);
        }

        [data-theme="light"] {
            --bg: #f5f7f9;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1a1a1a;
            --text-dim: rgba(0, 0, 0, 0.15);
            --shine: linear-gradient(110deg, #333 20%, #000 40%, #000 60%, #333 80%);
        }

        * { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; box-sizing: border-box; outline: none; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'PingFang SC', sans-serif; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; transition: 0.5s;
        }

        .nav { padding: 10px 20px; display: flex; justify-content: space-between; z-index: 100; flex-shrink: 0; }
        .btn-tool { 
            background: rgba(128,128,128,0.1); border: 1px solid rgba(128,128,128,0.1);
            color: var(--text); padding: 8px 12px; border-radius: 12px; font-size: 11px; cursor: pointer;
        }

        /* 1. 唱片区修复：确保封面显示 */
        .record-section { flex-shrink: 0; display: flex; justify-content: center; padding: 5px 0; position: relative; }
        .record-box { width: 240px; height: 240px; position: relative; z-index: 10; cursor: pointer; }
        
        .vinyl { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: radial-gradient(circle, #000 30%, transparent 31%), 
                        repeating-radial-gradient(circle, #0a0a0a, #000 1px, #181818 2px); 
            border: 6px solid #111; display: flex; align-items: center; justify-content: center; 
            animation: rotate 20s linear infinite paused; position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        /* 物理仿真层 */
        .record-box.physical .vinyl {
            background: radial-gradient(circle, transparent 42%, rgba(0,0,0,0.9) 43%),
                        repeating-radial-gradient(circle, #080808, #000 1px, #1a1a1a 2px);
        }
        .vinyl-inner-ring {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        }
        .record-box.physical .vinyl-inner-ring::before {
            content: ""; position: absolute; width: 46%; height: 46%; border-radius: 50%;
            background: #050505; box-shadow: inset 0 0 15px #000; z-index: 3;
        }

        .vinyl.playing { animation-play-state: running; }
        .vinyl::after { 
            content: ""; position: absolute; inset: 0; border-radius: 50%; 
            background: conic-gradient(from 170deg at 50% 50%, transparent 0deg, rgba(255,255,255,0.12) 8deg, transparent 15deg, transparent 170deg, rgba(255,255,255,0.12) 178deg, transparent 185deg); 
            pointer-events: none; z-index: 6;
        }
        
        /* 封面：确保层级高于背景 */
        .cover-art { 
            width: 75%; height: 75%; border-radius: 50%; 
            background-size: cover; background-position: center; 
            z-index: 5; background-color: #222;
            background-image: url('https://pdyvfhfwqlrizgcxlgax.supabase.co/storage/v1/object/public/MUSIC-FILES/default_gold.jpg'); 
        }

        /* 2. 品牌呼吸流光 */
        .info-box { text-align: center; padding: 10px 0; flex-shrink: 0; }
        .main-title { 
            font-size: 24px; font-weight: 700; letter-spacing: 4px; margin: 0;
            background-image: var(--shine); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            animation: metal 6s linear infinite;
        }

        /* 3. 歌词视口修复：扩宽视野 */
        .lrc-viewport { 
            flex-grow: 1; position: relative; overflow-y: auto; 
            scroll-snap-type: y mandatory;
            /* 调整渐变遮罩，让上下歌词更清晰 */
            mask-image: linear-gradient(to bottom, transparent 0%, #fff 20%, #fff 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, #fff 20%, #fff 80%, transparent 100%);
            margin: 5px 0;
        }
        .lrc-viewport::-webkit-scrollbar { display: none; }
        
        #lrc-list { list-style: none; padding: 180px 0; margin: 0; text-align: center; }
        .lrc-line { 
            padding: 12px 25px; font-size: 15px; color: var(--text-dim); 
            transition: 0.4s ease; min-height: 45px; display: flex; align-items: center; justify-content: center;
            scroll-snap-align: center; cursor: pointer;
        }
        /* 正在播放：亮白色 */
        .lrc-line.active { color: var(--text); font-size: 20px; font-weight: 600; transform: scale(1.05); }
        /* 预览中心：金色预览感 */
        .lrc-line.preview { color: var(--accent); opacity: 0.6; font-size: 18px; }

        /* 4. 控制面板 */
        .controls-section { flex-shrink: 0; padding: 15px 20px 30px; }
        .controls-card { 
            width: 100%; max-width: 400px; margin: 0 auto; 
            background: var(--card); padding: 15px 20px; border-radius: 30px; 
            backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.08);
        }
        .progress-box { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .time-lab { font-size: 10px; color: var(--accent); min-width: 35px; font-family: monospace; }
        
        .p-bar-container { flex: 1; height: 20px; display: flex; align-items: center; cursor: pointer; position: relative; }
        .p-bar { width: 100%; height: 4px; background: rgba(128,128,128,0.2); border-radius: 2px; }
        .p-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; position: relative; }
        .p-fill::after {
            content: ""; position: absolute; right: -6px; top: -4px;
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            border: 2px solid var(--accent);
        }

        .main-btn { 
            width: 48px; height: 48px; background: var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; margin: 0 auto;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes metal { to { background-position: 200% center; } }
    </style>
</head>
<body data-theme="dark">

    <div class="nav">
        <button class="btn-tool" onclick="toggleTheme()">🌓 模式切换</button>
        <button class="btn-tool" id="reset-btn" onclick="resetLrc()" style="display:none;">🎯 恢复追踪</button>
    </div>

    <div class="record-section">
        <div id="record-wrapper" class="record-box" onclick="toggleRecordStyle()">
            <div id="disk" class="vinyl">
                <div class="vinyl-inner-ring">
                    <div id="cover" class="cover-art"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="info-box">
        <h1 class="main-title">音迹星工作室</h1>
    </div>

    <div class="lrc-viewport" id="vPort">
        <ul id="lrc-list"></ul>
    </div>

    <div class="controls-section">
        <div class="controls-card">
            <div class="progress-box">
                <span class="time-lab" id="t-cur">00:00</span>
                <div class="p-bar-container" id="p-container">
                    <div class="p-bar"><div class="p-fill" id="p-fill"></div></div>
                </div>
                <span class="time-lab" id="t-dur">00:00</span>
            </div>
            <div class="main-btn" onclick="togglePlay()">
                <svg id="svg-p" viewBox="0 0 24 24" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="svg-s" viewBox="0 0 24 24" width="24" height="24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
        </div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio');
        const disk = document.getElementById('disk');
        const list = document.getElementById('lrc-list');
        const vPort = document.getElementById('vPort');
        const pFill = document.getElementById('p-fill');
        const pContainer = document.getElementById('p-container');
        const resetBtn = document.getElementById('reset-btn');
        const params = new URLSearchParams(window.location.search);

        let isAuto = true;
        let isDragging = false;
        let lyrics = [];

        // 1. 初始化数据
        const audioUrl = params.get('audio');
        const lrcUrl = params.get('lrc');

        if (audioUrl) {
            audio.src = audioUrl;
            window.jsmediatags.read(audioUrl, {
                onSuccess: (tag) => {
                    const img = tag.tags.picture;
                    if (img) {
                        let b64 = "";
                        for (let i = 0; i < img.data.length; i++) b64 += String.fromCharCode(img.data[i]);
                        document.getElementById('cover').style.backgroundImage = `url('data:${img.format};base64,${window.btoa(b64)}')`;
                    }
                }
            });
        }

        if (lrcUrl) {
            fetch(lrcUrl).then(r => r.text()).then(t => {
                lyrics = t.split('\n').map(l => {
                    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
                }).filter(x => x);
                list.innerHTML = lyrics.map((l, i) => `<li class="lrc-line" id="r-${i}" onclick="jumpTo(${i})">${l.text}</li>`).join('');
            });
        }

        // 2. 交互逻辑
        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function toggleRecordStyle() {
            document.getElementById('record-wrapper').classList.toggle('physical');
        }

        // 3. 【核心修正】滚动控制：拦截自动回弹
        vPort.addEventListener('wheel', () => setManualMode());
        vPort.addEventListener('mousedown', () => setManualMode());
        vPort.addEventListener('touchstart', () => setManualMode());

        function setManualMode() {
            if (isAuto) {
                isAuto = false;
                resetBtn.style.display = 'block';
            }
        }

        function resetLrc() {
            isAuto = true;
            resetBtn.style.display = 'none';
            syncLrc(true); // 立即回弹
        }

        function jumpTo(i) {
            setManualMode();
            const line = document.getElementById(`r-${i}`);
            vPort.scrollTo({ top: line.offsetTop - vPort.offsetHeight/2 + line.offsetHeight/2, behavior: 'smooth' });
        }

        // 4. 歌词渲染与预览效果
        vPort.addEventListener('scroll', () => {
            if (isAuto) return;
            const mid = vPort.scrollTop + vPort.offsetHeight / 2;
            document.querySelectorAll('.lrc-line').forEach(line => {
                const lineMid = line.offsetTop + line.offsetHeight / 2;
                line.classList.remove('preview');
                if (Math.abs(mid - lineMid) < 30 && !line.classList.contains('active')) {
                    line.classList.add('preview');
                }
            });
        });

        function syncLrc(force = false) {
            if ((!isAuto && !force) || lyrics.length === 0) return;
            let idx = 0;
            lyrics.forEach((l, i) => { if (audio.currentTime >= l.time) idx = i; });
            const activeLine = document.getElementById(`r-${idx}`);
            if (activeLine) {
                document.querySelectorAll('.lrc-line').forEach(el => el.classList.remove('active', 'preview'));
                activeLine.classList.add('active');
                vPort.scrollTo({ top: activeLine.offsetTop - vPort.offsetHeight/2 + activeLine.offsetHeight/2, behavior: 'smooth' });
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (isDragging) return;
            syncLrc();
            const p = (audio.currentTime / audio.duration) * 100;
            pFill.style.width = p + '%';
            document.getElementById('t-cur').innerText = fmt(audio.currentTime);
            document.getElementById('t-dur').innerText = fmt(audio.duration);
        });

        // 5. 进度条拖拽
        function getPos(clientX) {
            const rect = pContainer.getBoundingClientRect();
            let per = (clientX - rect.left) / rect.width;
            return Math.max(0, Math.min(1, per));
        }
        pContainer.addEventListener('mousedown', (e) => { isDragging = true; audio.currentTime = getPos(e.clientX) * audio.duration; });
        window.addEventListener('mousemove', (e) => { if (isDragging) pFill.style.width = (getPos(e.clientX) * 100) + '%'; });
        window.addEventListener('mouseup', (e) => { if (isDragging) { audio.currentTime = getPos(e.clientX) * audio.duration; isDragging = false; } });
        
        pContainer.addEventListener('touchstart', (e) => { isDragging = true; });
        window.addEventListener('touchmove', (e) => { if (isDragging) pFill.style.width = (getPos(e.touches[0].clientX) * 100) + '%'; });
        window.addEventListener('touchend', (e) => { if (isDragging) { audio.currentTime = getPos(e.changedTouches[0].clientX) * audio.duration; isDragging = false; } });

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        audio.onplay = () => { ui(true); };
        audio.onpause = () => { ui(false); };
        function ui(p) {
            document.getElementById('svg-p').style.display = p ? 'none' : 'block';
            document.getElementById('svg-s').style.display = p ? 'block' : 'none';
            p ? disk.classList.add('playing') : disk.classList.remove('playing');
        }
        function fmt(s) { const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); togglePlay(); } });
    </script>
</body>
</html>
