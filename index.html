<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音迹星工作室 - 专属定制预览</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --accent: #c0a16b; --bg: #050505; --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.15);
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'PingFang SC', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; transition: 0.5s; position: relative; }

        /* 粒子背景画布 */
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0; transition: 0.8s; }
        body.mode-default #particle-canvas { opacity: 0.6; }

        /* 导航与模式提示 */
        .nav { padding: 15px 20px; display: flex; justify-content: space-between; z-index: 100; flex-shrink: 0; }
        .btn-tool { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; }

        /* 1. 唱片区域：默认大图 vs 物理比例 */
        .record-section { flex-shrink: 0; display: flex; justify-content: center; padding: 20px 0; position: relative; z-index: 10; transition: 0.5s; }
        .record-box { width: 260px; height: 260px; position: relative; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .vinyl { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: repeating-radial-gradient(circle, #0a0a0a, #000 1px, #181818 2px); 
            border: 6px solid #111; display: flex; align-items: center; justify-content: center; 
            animation: rotate 20s linear infinite paused; position: relative; transition: 0.5s;
        }
        .vinyl.playing { animation-play-state: running; }

        /* 默认模式：封面全覆盖 + 震动感 */
        body.mode-default .cover-art { width: 100% !important; height: 100% !important; border: none; }
        body.mode-default .vinyl.playing { animation: rotate 20s linear infinite, vibrate 0.15s infinite alternate; }

        /* 物理模式：缩小封面显露反射环 */
        .record-box.physical .vinyl { background: radial-gradient(circle, transparent 42%, rgba(0,0,0,0.9) 43%), repeating-radial-gradient(circle, #080808, #000 1px, #1a1a1a 2px); }
        .vinyl-inner-ring { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
        .record-box.physical .inner-ring-pad { position: absolute; width: 46%; height: 46%; border-radius: 50%; background: #050505; box-shadow: inset 0 0 15px #000; z-index: 3; }
        .cover-art { width: 78%; height: 78%; border-radius: 50%; background-size: cover; background-position: center; z-index: 5; background-color: #111; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); background-image: url('https://pdyvfhfwqlrizgcxlgax.supabase.co/storage/v1/object/public/MUSIC-FILES/default_gold.jpg'); }

        /* 2. 歌词选定区域限制：收窄宽度 */
        .lrc-viewport { 
            flex-grow: 1; position: relative; overflow-y: auto; scroll-snap-type: y mandatory;
            width: 80%; margin: 0 auto; z-index: 20;
            mask-image: linear-gradient(to bottom, transparent, #fff 40%, #fff 60%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, #fff 40%, #fff 60%, transparent);
        }
        .lrc-viewport::-webkit-scrollbar { display: none; }
        #lrc-list { list-style: none; padding: 200px 0; margin: 0; text-align: center; }
        .lrc-line { 
            padding: 15px 10px; font-size: 15px; color: var(--text-dim); min-height: 55px; 
            display: flex; align-items: center; justify-content: center; scroll-snap-align: center; cursor: pointer; position: relative;
        }
        .lrc-line.active { color: var(--text); font-size: 20px; font-weight: 600; }
        .lrc-line.preview { color: var(--accent); opacity: 0.6; }

        /* 3. 预览跳播虚线与按钮 */
        .lrc-line.preview::after {
            content: ""; position: absolute; right: -40px; width: 100vw; height: 1px;
            border-bottom: 1px dashed rgba(192, 161, 107, 0.3); pointer-events: none;
        }
        .play-here-btn {
            position: absolute; right: 5px; background: var(--accent); color: #000;
            border-radius: 50%; width: 24px; height: 24px; font-size: 10px;
            display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 30;
        }
        .lrc-line.preview .play-here-btn { display: flex; }

        /* 4. 模式切换显示控制 */
        body.mode-lyrics .record-section { display: none; }
        body.mode-pure .lrc-viewport { display: none; }

        /* 5. 底部控制 */
        .controls-section { flex-shrink: 0; padding: 20px; z-index: 100; }
        .controls-card { width: 100%; max-width: 400px; margin: 0 auto; background: var(--glass); padding: 15px 20px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .progress-box { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .time-lab { font-size: 10px; color: var(--accent); font-family: monospace; }
        .p-bar-container { flex: 1; height: 20px; display: flex; align-items: center; cursor: pointer; }
        .p-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .p-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; position: relative; }
        .p-fill::after { content: ""; position: absolute; right: -6px; top: -4px; width: 12px; height: 12px; background: #fff; border-radius: 50%; border: 2px solid var(--accent); }
        .main-btn { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes vibrate { from { transform: rotate(0deg) scale(1); } to { transform: rotate(0.2deg) scale(1.005); } }
    </style>
</head>
<body class="mode-default" id="main-body" onclick="handleGlobalClick(event)">

    <canvas id="particle-canvas"></canvas>

    <div class="nav">
        <button class="btn-tool" onclick="toggleRecordStyle(event)">🎯 唱片切换</button>
        <button class="btn-tool" id="reset-btn" onclick="resetLrc(event)" style="display:none;">回到正唱</button>
    </div>

    <div class="record-section" id="rec-sec">
        <div id="record-wrapper" class="record-box">
            <div id="disk" class="vinyl">
                <div class="vinyl-inner-ring">
                    <div class="inner-ring-pad"></div>
                    <div id="cover" class="cover-art"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="lrc-viewport" id="vPort">
        <ul id="lrc-list"></ul>
    </div>

    <div class="controls-section">
        <div class="controls-card">
            <div class="progress-box">
                <span class="time-lab" id="t-cur">00:00</span>
                <div class="p-bar-container" id="p-container">
                    <div class="p-bar"><div class="p-fill" id="p-fill"></div></div>
                </div>
                <span class="time-lab" id="t-dur">00:00</span>
            </div>
            <div class="main-btn" onclick="togglePlay(event)">
                <svg id="svg-p" viewBox="0 0 24 24" width="24" height="24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="svg-s" viewBox="0 0 24 24" width="24" height="24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
        </div>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio'), disk = document.getElementById('disk');
        const list = document.getElementById('lrc-list'), vPort = document.getElementById('vPort');
        const pFill = document.getElementById('p-fill'), pContainer = document.getElementById('p-container');
        const body = document.getElementById('main-body'), resetBtn = document.getElementById('reset-btn');
        const params = new URLSearchParams(window.location.search);

        let isAuto = true, lyrics = [], displayMode = 0; // 0: Default, 1: Lyrics, 2: Pure
        let idleTimer = null;

        // 1. 初始化数据
        const audioUrl = params.get('audio'), lrcUrl = params.get('lrc');
        if (audioUrl) {
            audio.src = audioUrl;
            window.jsmediatags.read(audioUrl, {
                onSuccess: (tag) => {
                    const img = tag.tags.picture;
                    if (img) {
                        let b64 = "";
                        for (let i = 0; i < img.data.length; i++) b64 += String.fromCharCode(img.data[i]);
                        document.getElementById('cover').style.backgroundImage = `url('data:${img.format};base64,${window.btoa(b64)}')`;
                    }
                }
            });
        }
        if (lrcUrl) {
            fetch(lrcUrl).then(r => r.text()).then(t => {
                lyrics = t.split('\n').map(l => {
                    const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                    return m ? { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() } : null;
                }).filter(x => x);
                list.innerHTML = lyrics.map((l, i) => 
                    `<li class="lrc-line" id="r-${i}">
                        ${l.text}
                        <div class="play-here-btn" onclick="jumpToTime(event, ${l.time})">▶</div>
                    </li>`).join('');
            });
        }

        // 2. 模式切换机制：点击空白处触发
        function handleGlobalClick(e) {
            const forbidden = ['btn-tool', 'lrc-line', 'record-box', 'main-btn', 'p-bar-container', 'play-here-btn'];
            if (forbidden.some(cls => e.target.classList.contains(cls) || e.target.closest('.' + cls))) return;

            displayMode = (displayMode + 1) % 3;
            body.className = ['mode-default', 'mode-lyrics', 'mode-pure'][displayMode];
        }

        function toggleRecordStyle(e) { e.stopPropagation(); document.getElementById('record-wrapper').classList.toggle('physical'); }

        // 3. 歌词交互与 8s 智能回弹
        function setManualMode() {
            isAuto = false;
            resetBtn.style.display = 'block';
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => { resetLrc(); }, 8000); // 8秒无指令回弹
        }

        function resetLrc(e) { 
            if(e) e.stopPropagation();
            isAuto = true; 
            resetBtn.style.display = 'none'; 
            clearTimeout(idleTimer);
            syncLrc(true); 
        }

        function jumpToTime(e, time) { e.stopPropagation(); audio.currentTime = time; resetLrc(); }

        vPort.addEventListener('wheel', setManualMode);
        vPort.addEventListener('touchstart', setManualMode);

        vPort.addEventListener('scroll', () => {
            if (isAuto) return;
            const mid = vPort.scrollTop + vPort.offsetHeight / 2;
            document.querySelectorAll('.lrc-line').forEach(line => {
                const lineMid = line.offsetTop + line.offsetHeight / 2;
                line.classList.remove('preview');
                if (Math.abs(mid - lineMid) < 30 && !line.classList.contains('active')) line.classList.add('preview');
            });
        });

        function syncLrc(force = false) {
            if ((!isAuto && !force) || lyrics.length === 0) return;
            let idx = 0;
            lyrics.forEach((l, i) => { if (audio.currentTime >= l.time) idx = i; });
            const activeLine = document.getElementById(`r-${idx}`);
            if (activeLine) {
                document.querySelectorAll('.lrc-line').forEach(el => el.classList.remove('active', 'preview'));
                activeLine.classList.add('active');
                vPort.scrollTo({ top: activeLine.offsetTop - vPort.offsetHeight/2 + activeLine.offsetHeight/2, behavior: 'smooth' });
            }
        }

        // 4. 粒子系统实现
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = initCanvas; initCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = canvas.width / 2; this.y = canvas.height / 3;
                this.size = Math.random() * 2 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 1;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.life = 1; this.decay = Math.random() * 0.02 + 0.005;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; if (this.life <= 0) this.reset(); }
            draw() { ctx.fillStyle = `rgba(192, 161, 107, ${this.life})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for(let i=0; i<50; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            if (!audio.paused && displayMode === 0) {
                particles.forEach(p => { p.update(); p.draw(); });
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 5. 进度与控制
        audio.addEventListener('timeupdate', () => { syncLrc(); pFill.style.width = (audio.currentTime / audio.duration) * 100 + '%'; document.getElementById('t-cur').innerText = fmt(audio.currentTime); document.getElementById('t-dur').innerText = fmt(audio.duration); });
        function togglePlay(e) { e.stopPropagation(); audio.paused ? audio.play() : audio.pause(); }
        audio.onplay = () => { ui(true); }; audio.onpause = () => { ui(false); };
        function ui(p) { document.getElementById('svg-p').style.display = p ? 'none' : 'block'; document.getElementById('svg-s').style.display = p ? 'block' : 'none'; p ? disk.classList.add('playing') : disk.classList.remove('playing'); }
        function fmt(s) { const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
        function getPos(clientX) { const rect = pContainer.getBoundingClientRect(); return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)); }
        pContainer.addEventListener('mousedown', (e) => { audio.currentTime = getPos(e.clientX) * audio.duration; });
    </script>
</body>
</html>
